<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENKOS | PERSONAJE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #d4a373; /* Tono arena industrial */
            --bg: #000000;
            --text: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Playfair Display', serif;
            --transition-smooth: all 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden; /* Bloqueado hasta que ingresen */
            -webkit-font-smoothing: antialiased;
        }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .splash-header-img {
            width: 100px;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s forwards 0.3s;
        }

        .splash-header-img img {
            width: 100%;
            height: auto;
            filter: sepia(0.4) brightness(0.9);
        }

        #splash h1 {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 12vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* BOTÓN INTERACTIVO "INGRESAR A LA ATMÓSFERA" */
        .btn-atmosfera {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
            padding: 22px 45px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            z-index: 1;
        }

        .btn-atmosfera:hover {
            border-color: var(--accent);
            color: var(--bg);
            letter-spacing: 7px;
        }

        .btn-atmosfera::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--accent);
            transition: var(--transition-smooth);
            z-index: -1;
        }

        .btn-atmosfera:hover::before {
            left: 0;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none;
            opacity: 0;
            height: 100vh;
            overflow-y: auto;
            transition: opacity 1.5s ease;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,1)), url('img/silueta.jpg') no-repeat center center/cover;
            display: flex;
            align-items: flex-end;
            padding: 0 5% 8% 5%;
        }

        .hero h2 {
            font-family: var(--font-display);
            font-size: clamp(4.5rem, 18vw, 13rem);
            font-weight: 900;
            line-height: 0.8;
            text-transform: uppercase;
        }

        /* INFO GRID (ESTILO MARLON) */
        .info-grid {
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .info-item { padding: 30px 0; }
        .info-label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; }
        .info-value { font-size: 1.2rem; font-weight: 400; text-transform: uppercase; }

        /* EDITORIAL IMAGES */
        .editorial { padding: 120px 5%; }
        .editorial-img { width: 100%; margin-bottom: 120px; overflow: hidden; }
        .editorial-img img { width: 100%; display: block; transition: transform 2s ease; }
        .editorial-img:hover img { transform: scale(1.05); }

        /* POLAROIDS (FONDO BLANCO) */
        .polas {
            background-color: #ffffff;
            color: #000000;
            padding: 120px 5%;
            text-align: center;
        }

        .polas h3 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 60px;
            letter-spacing: -1px;
        }

        .pola-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .pola-grid img {
            width: 100%;
            filter: grayscale(100%);
            transition: all 0.6s ease;
        }

        .pola-grid img:hover { filter: grayscale(0%); }

        /* FOOTER ESTRATÉGICO */
        footer {
            background-color: var(--bg);
            padding: 100px 5%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .footer-section { display: flex; flex-direction: column; gap: 15px; }
        .footer-link { color: #ffffff; text-decoration: none; font-weight: 700; transition: color 0.3s; }
        .footer-link:hover { color: var(--accent); }

        /* ANIMACIONES */
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .pola-grid { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr 1fr; }
            footer { flex-direction: column; gap: 60px; text-align: left; }
            .footer-section { align-items: flex-start !important; text-align: left !important; }
            .splash-header-img { width: 80px; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-header-img">
            <img src="x.png" alt="1870 Icon">
        </div>
        <h1>BENKOS</h1>
        <button class="btn-atmosfera" id="start-btn">Ingresar a la atmósfera</button>
    </div>

    <audio id="bg-audio" loop>
        <source src="industrial.mp3" type="audio/mpeg">
    </audio>

    <div id="main-content">
        <section class="hero">
            <h2>BENKOS<br>LUCUMÍ</h2>
        </section>

        <section class="info-grid">
            <div class="info-item">
                <div class="info-label">Modelo</div>
                <div class="info-value">MARLON ESTUPIÑAN</div>
            </div>

            <div class="info-item">
                <div class="info-label">Estatura</div>
                <div class="info-value">1.85 CM</div>
            </div>

            <div class="info-item">
                <div class="info-label">Contexto</div>
                <div class="info-value">INDUSTRIAL</div>
            </div>
            <div class="info-item">
                <div class="info-label">Ubicación</div>
                <div class="info-value">VALLE, CO</div>
            </div>
            <div class="info-item">
                <div class="info-label">Personaje</div>
                <div class="info-value">OBRERO 1870</div>
            </div>
        </section>

        <section class="editorial">
            <div class="editorial-img"><img src="accion.png" alt="Benkos Acción"></div>
            <div class="editorial-img"><img src="retrato.png" alt="Benkos Retrato"></div>
             <div class="editorial-img"><img src="x.png" alt="Benkos Retrato"></div>
     
        </section>

        <section class="polas">
            <h3>POLAROIDS</h3>
            <div class="pola-grid">
                <img src="a.jpg" alt="Pola 01">
                <img src="b.jpg" alt="Pola 02">
                <img src="c.jpg" alt="Pola 03">
            </div>
        </section>

        <footer>
            <div class="footer-section">
                <div style="color: #444; margin-bottom: 10px;">Archive / Portfolios</div>
                <a href="https://hernanordonex-a11y.github.io/MARLON/" target="_blank" class="footer-link">[01] MARLON MAIN PORTFOLIO</a>
                <a href="https://hotziy.studio/bkm/" class="footer-link" style="color: var(--accent);">[02] BKM INDEX_COLLECTIVE</a>
            </div>

            <div class="footer-section" style="text-align: right; align-items: flex-end;">
                <div style="color: #444; margin-bottom: 10px;">Creative Studio</div>
                <span style="font-weight: 400; margin-bottom: 5px;">HOTZIY.STUDIO</span>
                <a href="https://www.instagram.com/hotziy" target="_blank" class="footer-link" style="border-bottom: 1px solid var(--accent);">@HOTZIY</a>
            </div>
        </footer>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const splash = document.getElementById('splash');
        const main = document.getElementById('main-content');
        const audio = document.getElementById('bg-audio');

        startBtn.addEventListener('click', () => {
            // Activar atmósfera sonora
            audio.play().catch(e => console.log("Audio interact ready"));
            
            // Transición física
            splash.style.transform = 'translateY(-100%)';
            
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'block';
                document.body.style.overflow = 'auto'; // Permitir scroll
                setTimeout(() => {
                    main.style.opacity = '1';
                }, 50);
            }, 1200);
        });

        // Parar audio si se minimiza la pestaña (opcional, para no molestar)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) { audio.pause(); } 
            else { if (main.style.display === 'block') audio.play(); }
        });
    </script>
</body>
</html>
